# ReckLock Discover — manual GitHub Actions workflow (repo root = composite action).
# Mirrored to https://github.com/robbiej24/ReckLockDiscover
#
# What it does: checkout pinned tag → offline scan → artifact with JSON & Markdown reports.
# How to run & risks: docs/github-actions.md
#
# For stable runs: set "Use workflow from" to v1.0.2 to match recklock_release (see docs/github-actions.md).
# OSS mirror: fine-grained RECKLOCK_OSS_SYNC_TOKEN needs Contents + Workflows read/write on robbiej24/ReckLockDiscover (Actions alone does not authorize edits under .github/workflows/).

name: ReckLock Discover

on:
  workflow_dispatch:
    inputs:
      recklock_release:
        description: "Pinned ReckLock Discover release tag to scan"
        type: choice
        required: true
        default: v1.0.2
        options:
          - v1.0.2

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.recklock_release }}

      - name: Scan repository
        uses: ./
        with:
          repo-path: .
          output-dir: recklock-reports

      - name: Upload scan reports
        uses: actions/upload-artifact@v6
        with:
          name: recklock-discover-reports
          path: recklock-reports/recklock_discover_scan_report.*
